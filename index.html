<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi amor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('img/amar.png') no-repeat center center/cover;
            font-family: 'Arial', sans-serif;
        }

        h1, h2, h3 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        h1 {
            font-size: 8vw;
            animation: fadeInOut 3s infinite;
        }

        h2 {
            font-size: 4vw;
            margin-top: 20px;
            animation: pulse 2s infinite;
        }

        h3 {
            font-size: 2.5vw;
            margin-top: 10px;
        }

        button {
            font-size: 3vw;
            padding: 15px 30px;
            margin-top: 30px;
            border: none;
            display: block;
            margin-left: auto;
            margin-right: auto;
            background-color: #ff3366;
            color: white;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
        }

        @keyframes fadeInOut {
            0%, 100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>
    <div>
        <h1>JOCE💘</h1>
        <h2>Tengo un regalo para ti</h2>

        <button onclick="window.location.href='rosas.html'">Ver regalo☞💛</button>
    </div>

    <audio id="musica" autoplay muted loop>
        <source src="audio/donas.mp3" type="audio/mpeg">
        Este navegador no acepta el formato de audio.
    </audio>

    <script>
        document.body.addEventListener('click', function() {
            var audio = document.getElementById('musica');
            audio.muted = false;
            audio.play();
        });
    </script>
</body>
</html>

<style>
    body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: black; /* 👈 esto */
    background-image: url('img/amar.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain; /* 👈 importante */
}
</style>
